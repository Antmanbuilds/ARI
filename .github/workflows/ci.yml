name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    defaults:
      run:
        working-directory: packages/ari-mcp-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: packages/ari-mcp-ts/package.json
      - run: npm install --no-audit --no-fund
      - run: npm test
      - run: npm run build
      - run: npm pack --dry-run

  python:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: packages/ari-mcp-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --upgrade pip build
      - run: pip install -e .
      - run: pip install pytest
      - run: pytest -q
      - run: python -m build
      - run: pip install twine && twine check dist/*

  spec:
    name: OpenAPI spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npx --yes @redocly/cli@latest lint spec/openapi.yaml
