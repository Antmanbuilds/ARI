openapi: 3.1.0
info:
  title: ARI · Agentic Rate Indicators
  summary: Live fair-market-value lookups, leaderboards, and Ed25519 signed-receipt verification for x402/MPP services.
  description: >-
    Public read-only HTTP API for ARI. Every JSON response on `/api/*` is signed with an Ed25519 receipt · see
    `spec/signed-receipts.md` for the wire format and `spec/verification.md` for a step-by-step verifier. The reference
    MCP clients (`ari-mcp` on npm and PyPI) wrap these endpoints as tools any MCP-aware agent can call.
  version: 0.1.2
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: ARI
    url: https://agentrateindicators.com
    email: security@agenticrates.org
servers:
  - url: https://agentrateindicators.com/api
    description: Production
externalDocs:
  description: Docs and MCP install snippets
  url: https://agentrateindicators.com/docs/mcp
paths:
  /categories:
    get:
      operationId: listCategories
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Category'
                type: array
          description: Categories
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: List service categories
      tags:
        - discovery
      x-ari-receipt: true
  /fair-price:
    get:
      description: |
        Returns the current FMV band for a service+unit, plus an optional
        traffic-light verdict if a candidate price is supplied.
      operationId: getFairPrice
      parameters:
        - description: Service slug
          in: query
          name: service
          required: true
          schema:
            type: string
        - description: Pricing unit (e.g. "1k_input_tokens"). Defaults to the service's primary unit.
          in: query
          name: unit
          required: false
          schema:
            type: string
        - description: Optional candidate price in micro-units of `currency` to grade against the FMV.
          in: query
          name: amount_micros
          required: false
          schema:
            format: int64
            type: integer
        - in: query
          name: currency
          required: false
          schema:
            default: USD
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FairPrice'
          description: Fair price
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Service or unit not found
      summary: Fair Market Value oracle
      tags:
        - pricing
      x-ari-receipt: true
  /healthz:
    get:
      operationId: healthCheck
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
          description: Healthy
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: Health check
      tags:
        - health
      x-ari-receipt: true
  /leaderboard:
    get:
      operationId: getLeaderboard
      parameters:
        - in: query
          name: metric
          required: false
          schema:
            default: cheapest
            enum:
              - cheapest
              - most_expensive
              - most_volatile
              - biggest_drop
              - biggest_jump
              - most_observed
            type: string
        - in: query
          name: category
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            default: 10
            maximum: 50
            minimum: 1
            type: integer
        - description: |
            When set, only score services whose most recent observation is
            within the given number of hours. Services that have never been
            observed are excluded.
          in: query
          name: maxStalenessHours
          required: false
          schema:
            maximum: 8760
            minimum: 1
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardResponse'
          description: Leaderboard
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: Movers, gainers, losers, and bargains
      tags:
        - market
      x-ari-receipt: true
  /protocols:
    get:
      operationId: listProtocols
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Protocol'
                type: array
          description: Protocols
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: Supported payment protocols
      tags:
        - discovery
      x-ari-receipt: true
  /reports:
    post:
      description: |
        Community-submitted price observation. Stored as `pending` until reviewed.
        Rate-limited per IP.
      operationId: submitPriceReport
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriceReportInput'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceReport'
          description: Created
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Validation error
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Too many requests
      summary: Submit an observed price report
      tags:
        - reports
      x-ari-receipt: true
  /reports/inflation:
    get:
      description: |
        For the last `weeks` ISO weeks, computes the median observation price
        (across all services) per category per week, plus a headline
        month-over-month change.
      operationId: getInflationReport
      parameters:
        - in: query
          name: weeks
          required: false
          schema:
            default: 13
            maximum: 52
            minimum: 4
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InflationReport'
          description: Inflation report
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: Per-category price inflation, weekly buckets
      tags:
        - analytics
      x-ari-receipt: true
  /reports/protocol-wars:
    get:
      operationId: getProtocolWarsReport
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtocolWarsReport'
          description: Protocol wars report
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: x402 vs MPP · share, spread and momentum
      tags:
        - analytics
      x-ari-receipt: true
  /services:
    get:
      operationId: listServices
      parameters:
        - description: Filter by category slug
          in: query
          name: category
          required: false
          schema:
            type: string
        - in: query
          name: protocol
          required: false
          schema:
            enum:
              - x402
              - mpp
              - both
            type: string
        - description: Search across name, vendor, description
          in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: sort
          required: false
          schema:
            default: name
            enum:
              - name
              - fmv_asc
              - fmv_desc
              - recent
              - volatility
              - freshest
              - stale
            type: string
        - description: |
            When set, only return services whose most recent observation is
            within the given number of hours. Services that have never been
            observed are excluded.
          in: query
          name: maxStalenessHours
          required: false
          schema:
            maximum: 8760
            minimum: 1
            type: integer
        - description: |
            Filter to services whose published `chains[]` array contains
            this chain identifier (e.g. `base`, `base-sepolia`,
            `polygon`). Case-sensitive; matched against the strings the
            upstream catalogs (x402scan, agentic.market, Coinbase
            facilitator) publish.
          in: query
          name: chain
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            default: 50
            maximum: 200
            minimum: 1
            type: integer
        - in: query
          name: offset
          required: false
          schema:
            default: 0
            minimum: 0
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceList'
          description: Services
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: List indexed services
      tags:
        - discovery
      x-ari-receipt: true
  /services/{slug}:
    get:
      operationId: getService
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceDetail'
          description: Service detail
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Not found
      summary: Get a service by slug
      tags:
        - discovery
      x-ari-receipt: true
  /services/{slug}/history:
    get:
      operationId: getServicePriceHistory
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: query
          name: days
          required: false
          schema:
            default: 30
            maximum: 90
            minimum: 1
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceHistory'
          description: History
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: Daily price history (FMV) for a service
      tags:
        - pricing
      x-ari-receipt: true
  /services/{slug}/observations:
    get:
      operationId: listServiceObservations
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            default: 100
            maximum: 500
            minimum: 1
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Observation'
                type: array
          description: Observations
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: Recent price observations for a service
      tags:
        - pricing
      x-ari-receipt: true
  /stats:
    get:
      description: Aggregate counts and last-indexed timestamps across the index.
      operationId: getMarketStats
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketStats'
          description: Stats
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: Global market statistics
      tags:
        - market
      x-ari-receipt: true
  /ticker:
    get:
      description: Compact rows for a scrolling price ticker.
      operationId: getTicker
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            default: 60
            maximum: 200
            minimum: 1
            type: integer
        - description: |
            When set, only include services whose most recent observation is
            within the given number of hours.
          in: query
          name: maxStalenessHours
          required: false
          schema:
            maximum: 8760
            minimum: 1
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TickerRow'
                type: array
          description: Ticker
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: Latest price observations across the index
      tags:
        - market
      x-ari-receipt: true
  /v1/facilitators:
    get:
      description: |
        Returns every tracked x402 facilitator alongside its 7-day
        observed metrics · settled-tx count, success rate, median
        settlement latency, median fee and 24h/7d volume. Metrics are
        `null` when no transactions have been observed in the window
        (clients should render "·", never a fake-precise `0`).
      operationId: listFacilitators
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilitatorIndex'
          description: Facilitator index
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: Public x402 facilitator (settlement-gateway) index
      tags:
        - analytics
      x-ari-receipt: true
  /v1/facilitators/hall-of-shame:
    get:
      operationId: getFacilitatorHallOfShame
      parameters:
        - in: query
          name: threshold
          required: false
          schema:
            default: 0.97
            maximum: 1
            minimum: 0
            type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilitatorHallOfShame'
          description: Hall of Shame entries
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: Facilitators with sub-threshold success rates
      tags:
        - analytics
      x-ari-receipt: true
  /v1/facilitators/live-summary:
    get:
      description: |
        Aggregated counters from the Base on-chain indexer. `txCount24h` and
        `volume24hMicros` cover the last 24 hours of observed USDC
        settlements; `facilitatorsActive24h` is the number of distinct
        facilitators whose tracked EOAs submitted at least one settlement
        in the same window. `txCount7d` and `facilitatorsActive7d` mirror
        those counters over a 7-day window; the 7d framing exists because
        24h windows on Base today are sparse enough that an honest
        `1 / 7 active 24h` reading routinely looks broken when in fact it
        just reflects a quiet day. `lastObservedAt` is the timestamp of
        the most recent observed tx (`null` when none).

        All values are honest: when the indexer has no observations the
        fields are `null` (or `0` for counts) and the UI renders an
        explicit "no data yet" state, never a fabricated price.
      operationId: getFacilitatorsLiveSummary
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilitatorsLiveSummary'
          description: Live settlement summary
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: Live on-chain settlement counters across all facilitators
      tags:
        - analytics
      x-ari-receipt: true
  /v1/facilitators/{slug}:
    get:
      operationId: getFacilitator
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilitatorSummary'
          description: Facilitator detail
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Facilitator not found
      summary: Detail view for a single facilitator
      tags:
        - analytics
      x-ari-receipt: true
  /v1/pubkey:
    get:
      description: |
        Returns the current Ed25519 public key (PEM + DER + key id +
        fingerprint). Mirrors `/.well-known/ari-pubkey.json`.
      operationId: getReceiptPublicKey
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: Public key metadata
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: Get the publisher's signing public key
      tags:
        - receipts
      x-ari-receipt: true
  /v1/reference-rates:
    get:
      description: |
        Returns all five v0 reference rates with their current value, band,
        basket, and constituents. Each priced rate also appears as an
        `Ari-Reference-Rate` header (one per priced rate) so that callers
        can verify the rate without parsing the body.
      operationId: listReferenceRates
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceRatesList'
          description: Reference rates fixings
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Reference-Rate:
              $ref: '#/components/headers/AriReferenceRate'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: List the v0 named reference rates (draft-ari-x402-fmv-00)
      tags:
        - receipts
      x-ari-receipt: true
  /v1/reference-rates/{id}:
    get:
      operationId: getReferenceRate
      parameters:
        - description: One of `ARI-X402-COMPUTE-1`, `ARI-X402-SEARCH-1`, `ARI-X402-SCRAPE-1`, `ARI-MPP-COMPUTE-1`, `ARI-MPP-DATA-1`
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceRateResponse'
          description: Reference rate value
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Reference-Rate:
              $ref: '#/components/headers/AriReferenceRate'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Unknown rate id
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Basket empty (no service snapshots yet)
      summary: Get a single reference rate
      tags:
        - receipts
      x-ari-receipt: true
  /v1/reference-rates/{id}/history:
    get:
      operationId: getReferenceRateHistory
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: days
          required: false
          schema:
            default: 30
            maximum: 90
            minimum: 1
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceRateHistoryResponse'
          description: Historical fixings
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Reference-Rate:
              $ref: '#/components/headers/AriReferenceRate'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: Get historical daily fixings for a reference rate
      tags:
        - receipts
      x-ari-receipt: true
  /v1/registry:
    get:
      description: |
        Returns DNS-verified service owners (vendors who have proven control of
        the service's domain via a `_ari-verify.<domain>` TXT record), plus any
        pending, expired, or revoked claims.
      operationId: listRegistry
      parameters:
        - in: query
          name: status
          required: false
          schema:
            enum:
              - pending
              - verified
              - expired
              - revoked
            type: string
        - in: query
          name: limit
          required: false
          schema:
            default: 200
            maximum: 500
            minimum: 1
            type: integer
        - in: query
          name: offset
          required: false
          schema:
            default: 0
            minimum: 0
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryListing'
          description: Registry listing
      summary: List service-owner mappings
      tags:
        - registry
      x-ari-receipt: true
  /v1/registry/leaderboard:
    get:
      description: |
        Per-vendor view of attestation activity in the last 30 days, plus the
        share of vendor-attested prices that fell within ±10% of the FMV at
        the same moment. Higher attestation count and higher agreement
        percentage = a more honest, more useful vendor.
      operationId: getRegistryLeaderboard
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            default: 50
            maximum: 100
            minimum: 1
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryLeaderboard'
          description: Leaderboard
      summary: Vendor honesty leaderboard
      tags:
        - registry
      x-ari-receipt: true
  /v1/registry/observations:
    post:
      description: |
        The signed payload is the JCS canonicalization of
        `{serviceSlug, unitCode, amountMicros, currency, claimedAt[, windowStart, windowEnd, notes]}`.
        The signature must verify under the registered vendor key for the slug
        and the slug's claim must be currently `verified`.
      operationId: ingestRegistryObservation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignedObservationInput'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                properties:
                  observation:
                    $ref: '#/components/schemas/VendorObservation'
                required:
                  - observation
                type: object
          description: Observation ingested
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Invalid body
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Signature did not verify
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Slug claim is pending, expired, or revoked
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: No registered owner for slug
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Too many requests
      summary: Submit a vendor-signed price observation
      tags:
        - registry
      x-ari-receipt: true
  /v1/registry/{slug}:
    get:
      description: |
        Returns the stored ownership record, the vendor's most recent
        attestations, and the live DNS lookup result so reviewers can verify
        the proof end-to-end.
      operationId: getRegistryEntry
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryEntryDetail'
          description: Entry detail
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: No claim for slug
      summary: Inspect a single registry entry
      tags:
        - registry
      x-ari-receipt: true
  /v1/spec/canonicalization:
    get:
      description: |
        Machine-readable description of how response bodies are canonicalized
        under the `ari-receipts/v1` profile of JCS (RFC 8785), and which
        headers participate in the signing input. The `ariProfileNotes`
        field on the response enumerates every place the profile extends
        or constrains strict RFC 8785.
      operationId: getReceiptCanonicalizationSpec
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: Spec
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: Get the receipt canonicalization spec
      tags:
        - receipts
      x-ari-receipt: true
  /v1/verify-receipt:
    get:
      operationId: lookupReceipt
      parameters:
        - description: ULID from the `Ari-Receipt-Id` header
          in: query
          name: receipt_id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: Receipt
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Receipt not found (older than retention window)
      summary: Re-fetch a previously emitted receipt by ULID
      tags:
        - receipts
      x-ari-receipt: true
    post:
      description: |
        Send a JSON body and the matching `Ari-*` header values; the server
        recomposes the signing input and verifies it against either the
        currently-loaded key or a caller-supplied PEM. This is the primitive
        the in-browser widget on `/transparency` uses.
      operationId: verifyReceiptInline
      requestBody:
        content:
          application/json:
            schema:
              properties:
                body:
                  description: Either a canonical JSON string OR a JS value to be canonicalized
                  oneOf:
                    - type: string
                    - type: object
                    - items: {}
                      type: array
                contentType:
                  type: string
                keyId:
                  type: string
                license:
                  type: string
                publicKeyPem:
                  description: Optional historical key; defaults to the current server key
                  type: string
                receiptId:
                  type: string
                signature:
                  description: base64-encoded Ed25519 signature
                  type: string
                signedAt:
                  type: string
              required:
                - body
                - signature
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  canonicalHash:
                    type: string
                  errors:
                    items:
                      type: string
                    type: array
                  serverFingerprint:
                    type: string
                  serverKeyId:
                    type: string
                  serverKeyMatches:
                    nullable: true
                    type: boolean
                  valid:
                    type: boolean
                required:
                  - valid
                  - errors
                type: object
          description: Verification result
          headers:
            Ari-Canonical-Hash:
              $ref: '#/components/headers/AriCanonicalHash'
            Ari-Key-Id:
              $ref: '#/components/headers/AriKeyId'
            Ari-Receipt-Id:
              $ref: '#/components/headers/AriReceiptId'
            Ari-Signature:
              $ref: '#/components/headers/AriSignature'
            Ari-Signed-At:
              $ref: '#/components/headers/AriSignedAt'
      summary: Stateless verification of a body + signature
      tags:
        - receipts
      x-ari-receipt: true
components:
  schemas:
    ApiError:
      properties:
        detail:
          type: string
        error:
          type: string
      required:
        - error
      type: object
    Category:
      properties:
