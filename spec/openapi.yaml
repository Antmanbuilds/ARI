            createdAt:
              format: date-time
              type: string
            id:
              type: string
            status:
              enum:
                - pending
                - accepted
                - rejected
              type: string
          required:
            - id
            - status
            - createdAt
          type: object
    PriceReportInput:
      properties:
        amountMicros:
          format: int64
          minimum: 1
          type: integer
        currency:
          default: USD
          type: string
        notes:
          maxLength: 600
          type: string
        reporter:
          maxLength: 80
          type: string
        serviceSlug:
          minLength: 1
          type: string
        sourceUrl:
          type: string
        tier:
          maxLength: 40
          type: string
        unitCode:
          minLength: 1
          type: string
