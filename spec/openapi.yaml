                format: int64
                type: integer
              lowMicros:
                format: int64
                type: integer
              sampleSize:
                type: integer
            required:
              - date
              - fmvMicros
              - sampleSize
            type: object
          type: array
        serviceSlug:
          type: string
        unitCode:
          type: string
      required:
        - serviceSlug
        - unitCode
        - currency
        - points
      type: object
    PriceReport:
      allOf:
        - $ref: '#/components/schemas/PriceReportInput'
