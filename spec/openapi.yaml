        - name
        - servicesIndexed
      type: object
    FacilitatorChainMetrics:
      properties:
        chain:
          type: string
        facilitatorSlug:
          type: string
        lastTxAt:
          format: date-time
          nullable: true
          type: string
        medianFeeMicros:
          format: int64
          nullable: true
          type: integer
        medianSettleMs:
          nullable: true
          type: integer
        successCount7d:
          type: integer
        successRate:
          description: |
            Observed success rate over the last 7 days. `null` when no tx
            were observed; clients render "·".
          nullable: true
          type: number
        txCount7d:
          type: integer
        uniqueServices7d:
          type: integer
        volume24hMicros:
          format: int64
          type: integer
        volume7dMicros:
          format: int64
          type: integer
        windowDays:
          type: integer
      required:
        - facilitatorSlug
        - chain
        - windowDays
        - txCount7d
        - successCount7d
        - volume24hMicros
        - volume7dMicros
        - uniqueServices7d
      type: object
    FacilitatorHallOfShame:
      properties:
        entries:
          items:
            $ref: '#/components/schemas/FacilitatorHallOfShameEntry'
          type: array
        generatedAt:
          format: date-time
          type: string
        threshold:
          type: number
      required:
        - generatedAt
        - threshold
        - entries
      type: object
    FacilitatorHallOfShameEntry:
      properties:
        chain:
          type: string
        medianSettleMs:
          nullable: true
          type: integer
        name:
          type: string
        operator:
          type: string
        slug:
          type: string
        successRate:
          type: number
        txCount7d:
          type: integer
      required:
        - slug
        - name
        - operator
        - chain
        - txCount7d
        - successRate
      type: object
    FacilitatorIndex:
      properties:
        generatedAt:
          format: date-time
          type: string
        items:
          items:
            $ref: '#/components/schemas/FacilitatorSummary'
          type: array
        total:
          type: integer
        windowDays:
          type: integer
      required:
        - generatedAt
        - windowDays
        - total
        - items
      type: object
    FacilitatorRecommendation:
      properties:
        chain:
          type: string
        medianFeeMicros:
          format: int64
          nullable: true
          type: integer
        medianSettleMs:
          nullable: true
          type: integer
        name:
          type: string
        slug:
          type: string
        successRate:
          type: number
      required:
        - slug
        - name
        - successRate
        - chain
      type: object
    FacilitatorSummary:
      properties:
        chains:
          items:
            type: string
          type: array
        chainsBreakdown:
          items:
            $ref: '#/components/schemas/FacilitatorChainMetrics'
          type: array
        description:
          nullable: true
          type: string
        docsUrl:
          nullable: true
          type: string
        homepage:
          nullable: true
          type: string
        lastTxAt:
          format: date-time
          nullable: true
          type: string
        medianFeeMicros:
          format: int64
          nullable: true
          type: integer
        medianSettleMs:
          nullable: true
          type: integer
        name:
          type: string
        operator:
          type: string
        slug:
          type: string
        status:
          enum:
            - live
            - beta
            - deprecated
            - unknown
          type: string
        successRate:
          nullable: true
          type: number
        txCount7d:
          type: integer
        uniqueServices7d:
          type: integer
        volume24hMicros:
          format: int64
          type: integer
        volume7dMicros:
          format: int64
          type: integer
      required:
        - slug
        - name
        - operator
        - chains
        - status
        - txCount7d
        - volume24hMicros
        - volume7dMicros
        - uniqueServices7d
        - chainsBreakdown
      type: object
    FacilitatorsLiveSummary:
      properties:
        chain:
          description: Chain the indexer is reading from (currently 'base').
          type: string
        facilitatorsActive24h:
          description: Distinct facilitators with at least one observed tx in the last 24h.
          type: integer
        facilitatorsActive7d:
          description: Distinct facilitators with at least one observed tx in the last 7d.
          type: integer
        facilitatorsTracked:
          description: Total facilitators in the catalog.
          type: integer
        generatedAt:
          format: date-time
          type: string
        indexerEnabled:
          description: Whether the on-chain indexer is configured (RPC creds present).
          type: boolean
        lastObservedAt:
          description: Timestamp of the most recent observed settlement. `null` when none.
          format: date-time
          nullable: true
          type: string
        txCount24h:
          description: USDC settlements observed in the last 24h. 0 when no observations.
          type: integer
        txCount7d:
          description: USDC settlements observed in the last 7d. 0 when no observations.
          type: integer
        volume24hMicros:
          description: Sum of settlement amounts in USDC micro-units over the last 24h. `null` when no observations.
          format: int64
          nullable: true
          type: integer
      required:
        - generatedAt
        - chain
        - txCount24h
        - txCount7d
        - facilitatorsActive24h
        - facilitatorsActive7d
        - facilitatorsTracked
        - indexerEnabled
      type: object
    FairPrice:
      allOf:
        - $ref: '#/components/schemas/FairPriceSummary'
        - properties:
            facilitator:
              allOf:
                - $ref: '#/components/schemas/FacilitatorRecommendation'
              description: |
                Recommended x402 facilitator for this service, picked from
                facilitators that settled this service in the last 7 days
                with ≥99% observed success at the lowest median fee.
                `null` when no facilitator has observed transactions for
                the cohort yet.
              nullable: true
            service:
              $ref: '#/components/schemas/Service'
            verdict:
              description: Present only when amount_micros is supplied.
              properties:
                deltaPct:
                  description: (amount - fmv) / fmv * 100
                  type: number
                label:
                  enum:
                    - green
                    - amber
                    - red
                  type: string
                rationale:
                  type: string
                score:
                  description: 'Normalized score: 0 = at FMV, +/- = std deviations from FMV'
                  type: number
              required:
                - label
                - score
                - deltaPct
              type: object
          type: object
    FairPriceProvenance:
      description: |
        Per-source breakdown of which observations contributed to the FMV
        window. The four counts sum to `sampleSize`. `vendorCount` reflects
        attestations from DNS-verified service owners only · pending,
        expired, or revoked vendors are silently excluded.
      properties:
        discoveryCount:
          minimum: 0
          type: integer
        probeCount:
          minimum: 0
          type: integer
        reportCount:
          minimum: 0
          type: integer
        vendorCount:
          minimum: 0
          type: integer
      required:
        - probeCount
        - discoveryCount
        - reportCount
        - vendorCount
      type: object
    FairPriceSummary:
      properties:
        change24hPct:
          description: |
            24h percentage change vs the previous 24h window. `null` means we
            don't have a comparison observation in the matching prior window
            yet · clients should render "·" rather than a fake-precise 0.00%.
            A real `0` means the prior window did contain observations and
            the median is unchanged.
          nullable: true
          type: number
        change7dPct:
          description: |
            7d percentage change vs the previous 7d window. Same null
            semantics as `change24hPct`.
          nullable: true
          type: number
        currency:
          type: string
        fmvMicros:
          description: Median observed price in micro-units
          format: int64
          type: integer
        highMicros:
          description: Upper band (FMV + 1.5*MAD)
          format: int64
          type: integer
        lowMicros:
          description: Lower band (FMV - 1.5*MAD)
          format: int64
          type: integer
        maxMicros:
          format: int64
          type: integer
        minMicros:
          format: int64
          type: integer
        provenance:
          $ref: '#/components/schemas/FairPriceProvenance'
        sampleSize:
          type: integer
        unitCode:
          type: string
        updatedAt:
          format: date-time
          type: string
        windowDays:
          type: integer
      required:
        - unitCode
        - currency
        - fmvMicros
        - lowMicros
        - highMicros
        - sampleSize
        - updatedAt
      type: object
    HealthStatus:
      properties:
        status:
          type: string
      required:
        - status
      type: object
    InflationCategorySeries:
      properties:
        categoryName:
          type: string
        categorySlug:
          type: string
        points:
          items:
            properties:
              fmvMicros:
                format: int64
                type: integer
              sampleSize:
                type: integer
              weekStart:
                format: date
                type: string
            required:
              - weekStart
              - fmvMicros
              - sampleSize
            type: object
          type: array
      required:
        - categorySlug
        - categoryName
        - points
      type: object
    InflationReport:
      properties:
        categories:
          items:
            $ref: '#/components/schemas/InflationCategorySeries'
          type: array
        generatedAt:
          format: date-time
          type: string
        headlineMomPct:
          description: Sample-count-weighted MoM change across all categories (last 4 weeks vs prior 4 weeks)
          type: number
        weeks:
          type: integer
      required:
        - weeks
        - generatedAt
        - headlineMomPct
        - categories
      type: object
    LeaderboardEntry:
