    Protocol:
      properties:
        description:
          type: string
        homepage:
          type: string
        id:
          enum:
            - x402
            - mpp
          type: string
        name:
          type: string
        servicesIndexed:
          type: integer
        settlement:
          description: e.g. USDC on Base, ACH/Card via Stripe, Tempo L1
          type: string
        sponsor:
          type: string
        transport:
          description: e.g. HTTP 402, JSON-RPC over HTTPS
          type: string
      required:
        - id
        - name
        - description
        - sponsor
        - homepage
        - transport
      type: object
    ProtocolWarsObservationDay:
      properties:
        date:
          format: date
          type: string
        mpp:
          type: integer
        x402:
          type: integer
      required:
        - date
        - x402
        - mpp
      type: object
    ProtocolWarsReport:
      properties:
        generatedAt:
          format: date-time
          type: string
        observationsByDay:
          items:
            $ref: '#/components/schemas/ProtocolWarsObservationDay'
          type: array
        share:
          items:
            $ref: '#/components/schemas/ProtocolWarsShare'
          type: array
        spreadByCategory:
          items:
            $ref: '#/components/schemas/ProtocolWarsSpread'
          type: array
      required:
        - generatedAt
        - share
        - spreadByCategory
        - observationsByDay
      type: object
    ProtocolWarsShare:
      properties:
        protocol:
          enum:
            - x402
            - mpp
          type: string
        services:
          type: integer
      required:
        - protocol
        - services
      type: object
    ProtocolWarsSpread:
      properties:
        categoryName:
          type: string
        categorySlug:
          type: string
        mppMicros:
          format: int64
          nullable: true
          type: integer
        spreadMicros:
          description: Signed price spread x402 - MPP per category, in micros. Null if either side missing.
          format: int64
          nullable: true
          type: integer
        x402Micros:
          format: int64
          nullable: true
          type: integer
      required:
        - categorySlug
        - categoryName
        - x402Micros
        - mppMicros
        - spreadMicros
      type: object
    ReferenceRate:
      properties:
        bandHighMicros:
          format: int64
          type: integer
        bandLowMicros:
          format: int64
          type: integer
        basketSize:
          type: integer
        constituents:
          items:
            $ref: '#/components/schemas/ReferenceRateConstituent'
          type: array
        description:
          type: string
        fixedAt:
          format: date-time
          type: string
        id:
          description: Stable rate id, e.g. ARI-X402-COMPUTE-1
          type: string
        methodologyUrl:
          type: string
        name:
          type: string
        protocol:
          enum:
            - x402
            - mpp
          type: string
        unit:
          type: string
        valueMicros:
          format: int64
          type: integer
      required:
        - id
        - name
        - protocol
        - unit
        - description
        - methodologyUrl
        - valueMicros
        - bandLowMicros
        - bandHighMicros
        - basketSize
        - fixedAt
        - constituents
      type: object
    ReferenceRateConstituent:
      properties:
        fmvMicros:
          format: int64
          type: integer
        sampleSize:
          type: integer
        serviceName:
          type: string
        serviceSlug:
          type: string
      required:
        - serviceSlug
        - serviceName
        - fmvMicros
        - sampleSize
      type: object
    ReferenceRateHistoryPoint:
      properties:
        bandHighMicros:
          format: int64
          type: integer
        bandLowMicros:
          format: int64
          type: integer
        basketSize:
          type: integer
        fixedAt:
          description: RFC3339 timestamp of the daily fixing event.
          format: date-time
          type: string
        valueMicros:
          format: int64
          type: integer
      required:
        - fixedAt
        - valueMicros
        - bandLowMicros
        - bandHighMicros
        - basketSize
      type: object
    ReferenceRateHistoryResponse:
      properties:
        days:
          type: integer
        history:
          items:
            $ref: '#/components/schemas/ReferenceRateHistoryPoint'
          type: array
        rateId:
          type: string
        spec:
          example: draft-ari-x402-fmv-00
          type: string
      required:
        - spec
        - rateId
        - days
        - history
      type: object
    ReferenceRateResponse:
      properties:
        rate:
          $ref: '#/components/schemas/ReferenceRate'
        spec:
          example: draft-ari-x402-fmv-00
          type: string
      required:
        - spec
        - rate
      type: object
    ReferenceRatesList:
      properties:
        publishedAt:
          format: date-time
          type: string
        rates:
          items:
            $ref: '#/components/schemas/ReferenceRate'
          type: array
        spec:
          example: draft-ari-x402-fmv-00
          type: string
      required:
        - spec
        - publishedAt
        - rates
      type: object
    RegistryEntryDetail:
      properties:
        dnsProof:
          properties:
            error:
              nullable: true
              type: string
            ok:
              type: boolean
            records:
              items:
                type: string
              type: array
          required:
            - ok
            - records
          type: object
        owner:
          $ref: '#/components/schemas/ServiceOwner'
        recentObservations:
          items:
            $ref: '#/components/schemas/VendorObservation'
          type: array
      required:
        - owner
        - recentObservations
        - dnsProof
      type: object
    RegistryLeaderboard:
      properties:
        entries:
          items:
            $ref: '#/components/schemas/RegistryLeaderboardEntry'
          type: array
      required:
        - entries
      type: object
    RegistryLeaderboardEntry:
      properties:
        agreementPct:
          description: Share of attestations within ±10% of FMV.
          type: number
        attestationCount:
          type: integer
        attestationCount30d:
          type: integer
        domain:
          type: string
        freshestAt:
          format: date-time
          nullable: true
          type: string
        slug:
          type: string
        status:
          enum:
            - pending
            - verified
            - expired
            - revoked
          type: string
        vendorKeyId:
          type: string
        verifiedAt:
          format: date-time
          nullable: true
          type: string
      required:
        - slug
        - domain
        - vendorKeyId
        - attestationCount
        - attestationCount30d
        - agreementPct
        - status
      type: object
    RegistryListing:
      properties:
        items:
          items:
            $ref: '#/components/schemas/ServiceOwner'
          type: array
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer
      required:
        - items
        - total
        - limit
        - offset
      type: object
    Service:
      properties:
        address:
          description: |
            On-chain settlement address surfaced by the upstream catalog.
            Omitted when no catalog has published one for this service.
          type: string
        category:
          type: string
        categoryName:
          type: string
        chains:
          description: |
            Settlement chains the vendor accepts (e.g. `["base",
            "base-sepolia"]`). Sourced from public catalogs (x402scan,
            agentic.market, Coinbase facilitator) and merged across
            adapters. Always present; empty when no source has published
            a chain list for this service.
          items:
            type: string
          type: array
        currency:
          default: USD
          type: string
        description:
          type: string
        docsUrl:
          type: string
        endpoint:
          type: string
        fairPrice:
          $ref: '#/components/schemas/FairPriceSummary'
        firstSeenAt:
          format: date-time
          type: string
        homepage:
          type: string
        lastObservationAt:
          description: |
            Alias for `lastObservedAt`: the timestamp of the most recent
            price observation recorded for this service.
          format: date-time
          type: string
        lastObservedAt:
          format: date-time
          type: string
        logoUrl:
          type: string
        name:
          type: string
        primaryUnit:
          $ref: '#/components/schemas/PricingUnit'
        protocol:
          enum:
            - x402
            - mpp
            - both
          type: string
        slug:
          type: string
        stalenessSeconds:
          description: |
            Seconds elapsed since the most recent observation, computed at
            response time. Omitted when no observations have been recorded.
          type: integer
        status:
          enum:
            - live
            - beta
            - deprecated
            - unknown
          type: string
        vendor:
          type: string
      required:
        - slug
        - name
        - vendor
        - protocol
        - category
        - primaryUnit
        - currency
        - status
      type: object
    ServiceDetail:
      allOf:
        - $ref: '#/components/schemas/Service'
        - properties:
            endpoints:
              description: |
                Concrete priced endpoints sourced from public scanners
                (x402scan / agentic.market). Each entry is a (method,
                path, price, currency, network) tuple representing one
                paid surface the vendor exposes. Empty when no source
                has published per-endpoint pricing.
              items:
                $ref: '#/components/schemas/ServiceEndpointEntry'
              type: array
            related:
              items:
                $ref: '#/components/schemas/Service'
              type: array
            sources:
              items:
                $ref: '#/components/schemas/SourceRef'
              type: array
            units:
              items:
                $ref: '#/components/schemas/PricingUnit'
              type: array
          type: object
    ServiceEndpointEntry:
      properties:
        address:
          description: Settlement address claimed by the catalog
          type: string
        currency:
          type: string
        method:
          description: HTTP method, upper-case
          type: string
        network:
          description: Settlement network for this endpoint
          type: string
        path:
          type: string
        priceMicros:
          format: int64
          type: integer
      required:
        - path
      type: object
    ServiceList:
      properties:
        hiddenByFreshness:
          description: |
            Number of services that match the other filters but were excluded
            by `maxStalenessHours`. Present only when `maxStalenessHours` is
            supplied; lets clients display a "hiding N stale services" hint
            without issuing a second unfiltered request.
          type: integer
        items:
          items:
            $ref: '#/components/schemas/Service'
          type: array
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer
      required:
        - items
        - total
        - limit
        - offset
      type: object
    ServiceOwner:
      properties:
        domain:
          type: string
        expiringAt:
          description: End of the 7-day grace window before status flips to `expired`.
          format: date-time
          nullable: true
          type: string
        lastReverifiedAt:
          format: date-time
          nullable: true
          type: string
        slug:
          type: string
        status:
          enum:
            - pending
            - verified
            - expired
            - revoked
          type: string
        txtRecord:
          properties:
            host:
              type: string
            value:
              type: string
          required:
            - host
            - value
          type: object
        vendorKeyId:
          description: Short fingerprint of the vendor key (vendor-<12 hex>).
          type: string
        vendorPubkeyHex:
          description: Raw 32-byte Ed25519 public key, hex-encoded.
          type: string
        verificationMethod:
          enum:
            - dns-txt
          type: string
        verifiedAt:
          format: date-time
          nullable: true
          type: string
      required:
        - slug
        - domain
        - vendorKeyId
        - vendorPubkeyHex
        - status
        - verificationMethod
        - txtRecord
      type: object
    SignedObservationInput:
      properties:
        amountMicros:
          format: int64
          minimum: 1
          type: integer
        claimedAt:
          format: date-time
          type: string
        currency:
          default: USD
          type: string
        notes:
          maxLength: 600
          type: string
        serviceSlug:
          type: string
        signature:
          description: Base64-encoded Ed25519 signature over the JCS canonical bytes.
          type: string
        unitCode:
          type: string
        windowEnd:
          format: date-time
          type: string
        windowStart:
          format: date-time
          type: string
      required:
        - serviceSlug
        - unitCode
        - amountMicros
        - currency
        - claimedAt
        - signature
      type: object
    SourceRef:
      properties:
        kind:
          enum:
            - discovery
            - catalog
            - docs
            - probe
            - report
          type: string
        name:
          type: string
        url:
          type: string
      required:
        - name
        - url
      type: object
    TickerRow:
      properties:
        change24hPct:
          description: |
            24h percentage change. `null` when we don't have a comparison
            observation in the prior 24h window yet · clients should render
            "·" rather than a fake-precise 0.00%.
          nullable: true
          type: number
        currency:
          type: string
        fmvMicros:
          format: int64
          type: integer
        lastMicros:
          format: int64
          type: integer
        observedAt:
          format: date-time
          type: string
        protocol:
          enum:
            - x402
            - mpp
            - both
          type: string
        serviceName:
          type: string
        serviceSlug:
          type: string
        unitCode:
          type: string
        vendor:
          type: string
        verdict:
          enum:
            - green
            - amber
            - red
          type: string
      required:
        - serviceSlug
        - serviceName
        - vendor
        - protocol
        - unitCode
        - fmvMicros
        - currency
        - observedAt
      type: object
    VendorObservation:
      properties:
        amountMicros:
          format: int64
          type: integer
        claimedAt:
          format: date-time
          type: string
        currency:
          type: string
        id:
          type: string
        ingestedAt:
          format: date-time
          type: string
        notes:
          nullable: true
          type: string
        serviceSlug:
          type: string
        unitCode:
          type: string
        vendorKeyId:
          type: string
        windowEnd:
          format: date-time
          nullable: true
          type: string
        windowStart:
          format: date-time
          nullable: true
          type: string
      required:
        - id
        - serviceSlug
        - unitCode
        - amountMicros
        - currency
        - vendorKeyId
        - claimedAt
        - ingestedAt
      type: object
