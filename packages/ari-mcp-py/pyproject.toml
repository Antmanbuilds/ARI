[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ari-mcp-server"
version = "0.2.0"
description = "MCP server that stops AI agents from overpaying. Drops into Claude Desktop, Cursor, Continue, Windsurf, Zed, ChatGPT desktop, and Gemini CLI to give any agent live fair-market-value lookups, a green/amber/red prepay verdict, and cryptographically-signed (Ed25519) receipts for every x402 / MPP / agentic-payment quote."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Agentic Rate Indicators" }]
keywords = [
  "mcp", "mcp-server", "model-context-protocol",
  "ari", "agentic-rate-indicators",
  "x402", "http-402", "mpp", "machine-payments",
  "fair-price", "fair-market-value", "fmv", "price-oracle",
  "signed-receipts", "ed25519",
  "agentic-payments", "agent-wallet", "ai-agents", "ai-payments", "llm-tools", "llm-agent",
  "anthropic", "claude", "claude-desktop", "cursor", "continue", "windsurf", "zed", "gemini", "openai", "chatgpt",
  "langchain", "langgraph", "llamaindex", "pydantic-ai",
  "coinbase", "stripe", "tempo",
]
classifiers = [
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Topic :: Software Development :: Libraries",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Typing :: Typed",
]
dependencies = [
  "mcp>=1.2.0",
  "httpx>=0.27",
  "cryptography>=41",
  "pydantic[email]>=2.5",
]

[project.optional-dependencies]
http = [
  "uvicorn>=0.30",
  "starlette>=0.37",
]

[project.urls]
Homepage = "https://agentrateindicators.com/docs/mcp"
Source = "https://github.com/Antmanbuilds/ARI"
Issues = "https://github.com/Antmanbuilds/ARI/issues"
Changelog = "https://github.com/Antmanbuilds/ARI/blob/main/CHANGELOG.md"
Documentation = "https://agentrateindicators.com/docs/mcp"

[project.scripts]
ari-mcp = "ari_mcp.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
